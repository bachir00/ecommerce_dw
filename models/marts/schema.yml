version: 2

models:
  - name: fct_orders
    description: "Main fact table — one row per order with aggregated metrics"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: order_total
        description: "Total order value including shipping"
        tests:
          - not_null
      - name: order_status
        description: "Current status of the order"
      - name: delivery_days
        description: "Number of days from purchase to delivery"
      - name: delivered_on_time
        description: "Boolean — true if delivered before estimated date"

  - name: dim_customers
    description: "Customer dimension with purchase history and segmentation"
    columns:
      - name: customer_id
        description: "Unique identifier for each customer"
        tests:
          - unique
          - not_null
      - name: customer_segment
        description: "Customer segment based on purchase frequency"
        tests:
          - accepted_values:
              arguments:
                values: ['one_time', 'occasional', 'loyal']
      - name: total_orders
        description: "Total number of orders placed by the customer"
      - name: customer_lifetime_days
        description: "Days between first and last order"

  - name: dim_products
    description: "Product dimension with sales performance metrics"
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        tests:
          - unique
          - not_null
      - name: product_category_name
        description: "Product category in Portuguese"
      - name: total_revenue
        description: "Total revenue generated by this product"

  - name: dim_date
    description: "Date dimension spanning 2016 to 2020"
    columns:
      - name: date_day
        description: "Calendar date (primary key)"
        tests:
          - unique
          - not_null
      - name: year_month
        description: "Year and month in YYYY-MM format"
      - name: is_weekend
        description: "Boolean — true if Saturday or Sunday"

  - name: rpt_monthly_kpis
    description: "Monthly business KPIs — revenue, orders, delivery, satisfaction"
    columns:
      - name: year_month
        description: "Reporting month in YYYY-MM format"
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: "Total revenue for the month in BRL"
      - name: avg_order_value
        description: "Average order value for the month"
      - name: on_time_delivery_rate
        description: "Percentage of orders delivered on time"

  - name: rpt_revenue_by_category
    description: "Revenue breakdown by product category"
    columns:
      - name: product_category_name
        description: "Product category name"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue for this category in BRL"
      - name: units_sold
        description: "Total units sold in this category"